# Nginx configuration for TEDx Backend
# Place this file in /etc/nginx/sites-available/tedx-backend
# Then create symlink: sudo ln -s /etc/nginx/sites-available/tedx-backend /etc/nginx/sites-enabled/

upstream backend {
    server localhost:4000;
}

server {
    listen 80;
    server_name api.your-domain.com;  # Change this to your domain
    
    # Redirect HTTP to HTTPS (after SSL is setup)
    # return 301 https://$server_name$request_uri;

    # Increase upload size limit
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/tedx-backend-access.log;
    error_log /var/log/nginx/tedx-backend-error.log;

    # Proxy to Node.js backend
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }
}

